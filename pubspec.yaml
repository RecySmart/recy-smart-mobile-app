name: recysmart
description: RecySmart - Smart PET Recycling with IoT & Gamification
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4
  equatable: ^2.0.5

  # Networking
  dio: ^5.7.0

  # Dependency Injection
  get_it: ^8.0.2

  # Local Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3

  # Navigation
  go_router: ^14.6.2

  # QR Code
  mobile_scanner: ^6.0.11
  qr_flutter: ^4.1.0

  # UI & Design
  google_fonts: ^6.2.1
  shimmer: ^3.0.0

  # Map
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  url_launcher: ^6.3.1

  # WebSocket (Socket.io)
  socket_io_client: ^2.0.3+1

  # Functional programming
  dartz: ^0.10.1

  # Utilities
  intl: ^0.19.0
  permission_handler: ^11.3.1
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mocktail: ^1.0.4
  bloc_test: ^9.1.7

flutter:
  uses-material-design: true